apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cortex-hdc
  namespace: default
  labels:
    app: cortex-hdc
spec:
  selector:
    matchLabels:
      app: cortex-hdc
  template:
    metadata:
      labels:
        app: cortex-hdc
    spec:
      containers:
      - name: cortex-hdc
        image: ghcr.io/jbraconig/cortex-hdc:latest
        imagePullPolicy: Always
        args: ["auto", "--file", "/host/var/log/syslog"]
        envFrom:
        - configMapRef:
            name: cortex-config
        ports:
        - containerPort: 9090
          name: metrics
        volumeMounts:
        - name: host-logs
          mountPath: /host/var/log
          readOnly: true
        - name: init-logs
          mountPath: /data/init-logs
          readOnly: true
        - name: cortex-data
          mountPath: /data
      volumes:
      - name: host-logs
        hostPath:
          path: /var/log
      - name: init-logs
        configMap:
          name: cortex-init-logs
          optional: true
      - name: cortex-data
        hostPath:
          path: /var/lib/cortex-hdc
          type: DirectoryOrCreate
