syntax = "proto3";

package cortex.telemetry.v1;

option go_package = "github.com/jbraconig/cortex-hdc/api/proto/v1;telemetryv1";

service TelemetryService {
  rpc ReportAnomaly(AnomalyReportRequest) returns (AnomalyReportResponse);
  rpc SendHeartbeat(HeartbeatRequest) returns (HeartbeatResponse);
}

message AnomalyReportRequest {
  string token = 1;
  string node_id = 2;
  double anomaly_score = 3;
  int64 timestamp = 4;
  bytes hdc_vector = 5;
  string raw_log = 6;
  double threshold = 7;
}

message AnomalyReportResponse {
  bool success = 1;
  string message = 2;
}

message HeartbeatRequest {
  string token = 1;
  string node_id = 2;
  int64 timestamp = 3;
}

message HeartbeatResponse {
  bool success = 1;
  string message = 2;
}
